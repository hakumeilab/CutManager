name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          $versionFile = Join-Path $PWD 'cutmanager\__init__.py'
          $changelogFile = Join-Path $PWD 'CHANGELOG.md'

          $versionContent = Get-Content -LiteralPath $versionFile -Raw -Encoding UTF8
          $versionMatch = [regex]::Match($versionContent, '__version__\s*=\s*"(?<version>[^"]+)"')
          if (-not $versionMatch.Success) {
            throw "Version could not be resolved from cutmanager/__init__.py."
          }

          $version = $versionMatch.Groups['version'].Value.Trim()
          if (-not $version) {
            throw "Version could not be resolved."
          }

          $expectedTag = "v$version"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match version $version."
          }

          $changelogContent = Get-Content -LiteralPath $changelogFile -Raw -Encoding UTF8
          $headerPattern = "(?m)^##\s+$([regex]::Escape($version))(?:\s+-\s+.+)?\s*$"
          $headerMatch = [regex]::Match($changelogContent, $headerPattern)
          if (-not $headerMatch.Success) {
            throw "Version $version was not found in CHANGELOG.md."
          }

          $remainingContent = $changelogContent.Substring($headerMatch.Index + $headerMatch.Length)
          $nextHeaderMatch = [regex]::Match($remainingContent, '(?m)^##\s+')
          if ($nextHeaderMatch.Success) {
            $notes = $remainingContent.Substring(0, $nextHeaderMatch.Index).Trim()
          } else {
            $notes = $remainingContent.Trim()
          }

          if (-not $notes) {
            throw "CHANGELOG.md entry for version $version is empty."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -LiteralPath $notesPath -Value $notes -Encoding utf8

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "notes_path=$notesPath"

      - name: Build release assets
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          .\build_release.ps1

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.metadata.outputs.version }}"
          $notesPath = "${{ steps.metadata.outputs.notes_path }}"
          $exePath = "dist/CutManager-$version-windows-onefile.exe"
          $hashPath = "dist/CutManager-$version-windows-onefile.sha256.txt"

          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Release executable was not found: $exePath"
          }

          if (-not (Test-Path -LiteralPath $hashPath)) {
            throw "Release checksum was not found: $hashPath"
          }

          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $PSNativeCommandUseErrorActionPreference = $true

          if ($releaseExists) {
            gh release upload $tag $exePath $hashPath --clobber
            gh release edit $tag --title "CutManager $version" --notes-file $notesPath
            exit $LASTEXITCODE
          }

          gh release create $tag $exePath $hashPath --title "CutManager $version" --notes-file $notesPath
